<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>Alla One - Metronome</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0b0b">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">

<style>
:root { --primary: #ff9800; --bg: #0b0b0b; --card: #1e1e1e; }

body {
  margin:0; background: var(--bg); color:white;
  font-family: -apple-system, system-ui, sans-serif;
  text-align:center; padding-bottom: 20px;
  overflow-x: hidden; -webkit-tap-highlight-color: transparent;
}

/* Enhanced Sticky Header */
.sticky-header {
  position: sticky; top: 0; background: var(--bg);
  z-index: 100; padding: 10px; border-bottom: 1px solid #333;
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
}

.display { font-size: 70px; font-weight: bold; color: var(--primary); margin: 0; line-height: 1; }
.beats { display:flex; justify-content:center; gap:8px; margin: 8px 0; min-height: 15px; }
.dot { width: 12px; height: 12px; border-radius: 50%; background: #333; transition: 0.1s; }
.red { background: #ff1744 !important; box-shadow: 0 0 10px #ff1744; transform: scale(1.2); }
.green { background: #00ff88 !important; transform: scale(1.1); }

/* Quick Adjust Buttons in Header */
.tempo-adjust { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
.btn-adj { background: #222; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; font-size: 14px; min-width: 45px; }

.start-btn { width: 90%; max-width: 350px; font-size: 22px; background: #00c853; color: black; font-weight: bold; border: none; border-radius: 50px; padding: 12px; }
.start-btn.stop { background: #ff1744; }

/* Main UI */
.slider-container { padding: 20px 20px 10px 20px; }
input[type=range] {
  width: 100%; -webkit-appearance: none; background: #333; height: 8px; border-radius: 5px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 30px; height: 30px; background: var(--primary); border-radius: 50%; cursor: pointer;
}

.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 15px; }
button { background: #222; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 14px; transition: 0.2s; }
button.active { background: var(--primary) !important; color: black !important; font-weight: bold; }

.exercise-card { background: var(--card); margin: 15px; padding: 15px; border-radius: 12px; text-align: left; border: 1px solid #333; }
.exercise-card.selected { border-color: var(--primary); }
.card-title { font-size: 18px; font-weight: bold; width: 100%; background: transparent; color: white; border: none; border-bottom: 1px solid #444; margin-bottom: 10px; }
.card-meta { display: flex; justify-content: space-between; align-items: center; }
.time-display { font-family: monospace; font-size: 18px; color: #aaa; }

.btn-group { display: flex; gap: 5px; margin-top: 15px; }
.btn-small { padding: 8px; font-size: 11px; flex: 1; text-transform: uppercase; }

label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 3px; }
</style>
</head>
<body>

<div class="sticky-header">
    <div class="display" id="tempoDisplay">120</div>
    <div class="beats" id="beatsContainer"></div>
    
    <div class="tempo-adjust">
        <button class="btn-adj" onclick="changeTempo(-10)">-10</button>
        <button class="btn-adj" onclick="changeTempo(-1)">-1</button>
        <button class="btn-adj" onclick="changeTempo(1)">+1</button>
        <button class="btn-adj" onclick="changeTempo(10)">+10</button>
    </div>
    
    <button id="startBtn" class="start-btn" onclick="togglePlay()">START</button>
</div>

<div class="slider-container">
    <input type="range" id="tempoSlider" min="40" max="280" value="120" oninput="updateFromSlider(this.value)">
</div>

<div class="controls-grid">
    <div style="text-align: left;">
        <label>Time Sig</label>
        <select id="timeSig" style="width:100%; background:#222; color:white; border-radius:8px; padding:10px; border:none;" onchange="createDots()">
            <option value="2">2/4</option><option value="3">3/4</option><option value="4" selected>4/4</option>
            <option value="5">5/4</option><option value="6">6/4</option>
        </select>
    </div>
    <div style="text-align: left;">
        <label>Sync</label>
        <button id="tapBtn" style="width:100%; background:#333; color:var(--primary); border:1px solid var(--primary);">TAP TEMPO</button>
    </div>
    <div style="grid-column: span 2; display: flex; gap: 5px;">
        <button class="sub-btn active" style="flex:1" onclick="setSub(1, this)">1/4</button>
        <button class="sub-btn" style="flex:1" onclick="setSub(2, this)">1/8</button>
        <button class="sub-btn" style="flex:1" onclick="setSub(3, this)">TRI</button>
        <button class="sub-btn" style="flex:1" onclick="setSub(4, this)">1/16</button>
    </div>
    <div style="grid-column: span 2; display: flex; gap: 5px;">
        <button class="sound-btn active" style="flex:1" onclick="setSnd('wood', this)">WOOD</button>
        <button class="sound-btn" style="flex:1" onclick="setSnd('sharp', this)">SHARP</button>
    </div>
</div>

<hr style="border:0; border-top:1px solid #333; margin:20px 0;">

<div style="padding: 0 15px;">
    <h3 style="text-align: left; font-size: 12px; color: #888; text-transform: uppercase;">Practice Tracker</h3>
    <button style="width:100%; background: var(--primary); color: black; font-weight: bold; padding:12px;" onclick="addExercise()">+ ADD NEW EXERCISE</button>
</div>

<div id="exerciseList"></div>

<script>
let audioCtx = null, tempo = 120, isPlaying = false, currentBeat = 0, subdivision = 1, soundType = "wood", nextNoteTime = 0.0, timerID = null, wakeLock = null;
let tapTimes = [], selectedIdx = null, practiceInterval = null;

const display = document.getElementById("tempoDisplay"), slider = document.getElementById("tempoSlider"), startBtn = document.getElementById("startBtn");

function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log("WakeLock failed"); }
}

function updateFromSlider(val) { tempo = parseInt(val); display.textContent = tempo; }
function changeTempo(d) { tempo = Math.min(280, Math.max(40, tempo + d)); display.textContent = tempo; slider.value = tempo; }

document.getElementById("tapBtn").addEventListener('pointerdown', (e) => {
    const now = performance.now();
    if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 2000) tapTimes = [];
    tapTimes.push(now);
    if (tapTimes.length > 1) {
        if (tapTimes.length > 4) tapTimes.shift();
        let intervals = [];
        for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
        tempo = Math.round(60000 / (intervals.reduce((a, b) => a + b) / intervals.length));
        tempo = Math.min(280, Math.max(40, tempo));
        display.textContent = tempo; slider.value = tempo;
    }
});

function createDots() {
    const container = document.getElementById("beatsContainer"); container.innerHTML = "";
    for (let i = 0; i < parseInt(document.getElementById("timeSig").value); i++) {
        const d = document.createElement("div"); d.className = "dot"; d.id = `d${i}`; container.appendChild(d);
    }
}

function scheduleNote(beatNumber, time) {
    const isMain = beatNumber % subdivision === 0;
    const ts = parseInt(document.getElementById("timeSig").value);
    const osc = audioCtx.createOscillator(); const env = audioCtx.createGain();
    let freq = soundType === "wood" ? 800 : 2000;
    if (isMain) {
        if ((beatNumber / subdivision) % ts === 0) freq *= 1.5;
        env.gain.setValueAtTime(1, time);
        const visualBeat = (beatNumber / subdivision) % ts;
        setTimeout(() => {
            document.querySelectorAll(".dot").forEach(d => d.classList.remove("red", "green"));
            const active = document.getElementById(`d${visualBeat}`);
            if (active) active.classList.add(visualBeat === 0 ? "red" : "green");
        }, (time - audioCtx.currentTime) * 1000);
    } else { freq *= 0.6; env.gain.setValueAtTime(0.3, time); }
    osc.frequency.value = freq; env.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    osc.connect(env); env.connect(audioCtx.destination);
    osc.start(time); osc.stop(time + 0.06);
}

function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        scheduleNote(currentBeat, nextNoteTime);
        nextNoteTime += (60.0 / tempo) / subdivision;
        currentBeat++;
    }
}

function togglePlay() {
    initAudio();
    if (!isPlaying) {
        currentBeat = 0; nextNoteTime = audioCtx.currentTime;
        timerID = setInterval(scheduler, 25);
        startBtn.textContent = "STOP"; startBtn.classList.add("stop");
        requestWakeLock(); startTimer();
    } else {
        clearInterval(timerID);
        startBtn.textContent = "START"; startBtn.classList.remove("stop");
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        stopTimer();
    }
    isPlaying = !isPlaying;
}

let exercises = JSON.parse(localStorage.getItem("allaOne_ex") || "[]");
function save() { localStorage.setItem("allaOne_ex", JSON.stringify(exercises)); }
function render() {
    const list = document.getElementById("exerciseList"); list.innerHTML = "";
    exercises.forEach((ex, i) => {
        const div = document.createElement("div");
        div.className = `exercise-card ${i === selectedIdx ? 'selected' : ''}`;
        div.innerHTML = `
            <input class="card-title" value="${ex.name}" onchange="exercises[${i}].name=this.value;save()">
            <div class="card-meta">
                <div class="time-display">${Math.floor(ex.time/60)}:${(ex.time%60).toString().padStart(2,'0')}</div>
                <div style="font-weight:bold; color:var(--primary)">${ex.bpm} BPM</div>
            </div>
            <div class="btn-group">
                <button class="btn-small" onclick="selectEx(${i})">Select</button>
                <button class="btn-small btn-save" onclick="exercises[${i}].bpm=tempo;save();render()">Save BPM</button>
                <button class="btn-small btn-reset" onclick="exercises[${i}].time=0;save();render()">Reset</button>
                <button class="btn-small" style="background:#721c24" onclick="exercises.splice(${i},1);save();render()">X</button>
            </div>`;
        list.appendChild(div);
    });
}
function selectEx(i) { selectedIdx = i; tempo = exercises[i].bpm; display.textContent = tempo; slider.value = tempo; render(); }
function addExercise() { exercises.push({ name: "New Exercise", bpm: tempo, time: 0 }); save(); render(); }
function startTimer() { if (selectedIdx !== null) practiceInterval = setInterval(() => { exercises[selectedIdx].time++; save(); render(); }, 1000); }
function stopTimer() { clearInterval(practiceInterval); }
function setSub(v, btn) { subdivision = v; document.querySelectorAll(".sub-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); }
function setSnd(s, btn) { soundType = s; document.querySelectorAll(".sound-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); }

createDots(); render();
</script>
</body>
</html>
